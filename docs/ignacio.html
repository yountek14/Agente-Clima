<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignacio Salazar - AgenteClima</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #E7E3D8;
            color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border: 3px solid #000;
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #000;
            object-fit: cover;
            margin-bottom: 16px;
        }
        .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #000;
            margin: 0 auto 16px auto;
            background: #E7E3D8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }
        h1 { font-size: 22px; font-weight: 800; }
        .role {
            display: inline-block;
            background: #000;
            color: #EBCF7C;
            padding: 3px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin: 6px 0 14px 0;
        }
        .info { text-align: left; margin: 16px 0; }
        .info .row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #E7E3D8;
            font-size: 14px;
        }
        .info .row:last-child { border-bottom: none; }
        .info .icon { font-size: 18px; width: 24px; text-align: center; }
        .info a { color: #000; text-decoration: none; }
        .btn {
            display: block;
            background: #000;
            color: #EBCF7C;
            padding: 12px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-top: 12px;
        }
        .project-tag {
            margin-top: 14px;
            font-size: 12px;
            color: #888;
        }
        .project-tag a { color: #666; }
    </style>
</head>
<body>
<div class="card">

    <!-- REEMPLAZAR con <img class="avatar" src="TU_FOTO.jpg" alt="Ignacio"> -->
    <div class="avatar-placeholder">&#x1F464;</div>

    <h1>Ignacio Salazar</h1>
    <div class="role">Desarrollador</div>

    <div class="info">
        <div class="row">
            <span class="icon">&#x1F4E7;</span>
            <span>TU_CORREO@gmail.com</span>
        </div>
        <div class="row">
            <span class="icon">&#x1F517;</span>
            <a href="#" target="_blank">linkedin.com/in/TU_USUARIO</a>
        </div>
        <div class="row">
            <span class="icon">&#x1F4BB;</span>
            <a href="#" target="_blank">github.com/TU_USUARIO</a>
        </div>
        <div class="row">
            <span class="icon">&#x1F393;</span>
            <span>DuocUC Puerto Montt</span>
        </div>
    </div>

    <a href="/Agente-Clima/" class="btn">AgenteClima - Proyecto</a>

    <div class="project-tag">
        Summit IA Puerto Montt 2026 &middot; <a href="https://github.com/yountek14/Agente-Clima">GitHub</a>
    </div>

</div>
</body>
</html>
