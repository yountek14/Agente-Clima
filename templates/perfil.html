<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Agente Clima</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .perfil-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .perfil-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .perfil-avatar-grande {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #000;
            object-fit: cover;
            margin-bottom: 15px;
        }
        
        .perfil-avatar-grande-container {
            position: relative;
            display: inline-block;
        }
        
        .btn-cambiar-avatar {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        
        .btn-cambiar-avatar:hover {
            transform: scale(1.1);
        }
        
        .perfil-nombre {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .perfil-email {
            font-size: 14px;
            color: #666;
        }
        
        .perfil-seccion {
            background: #fff;
            border: 3px solid #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .perfil-seccion-titulo {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .perfil-campo {
            margin-bottom: 15px;
        }
        
        .perfil-campo label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
        }
        
        .perfil-campo input {
            width: 100%;
            padding: 12px 16px;
            border: 3px solid #000;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .perfil-campo input:focus {
            outline: none;
            border-color: #EBCF7C;
        }
        
        .perfil-btn-guardar {
            background: #000;
            color: #fff;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .perfil-btn-guardar:hover {
            transform: scale(1.02);
        }
        
        .perfil-btn-guardar:active {
            transform: scale(0.98);
        }
        
        .perfil-mensaje {
            padding: 12px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        
        .perfil-mensaje.exito {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .perfil-mensaje.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .perfil-btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }
        
        .perfil-btn-volver:hover {
            opacity: 0.7;
        }
        
        #input-foto-perfil {
            display: none;
        }
    </style>
</head>
<body>
    <div class="perfil-container">
        <a href="/" class="perfil-btn-volver">← Volver al inicio</a>
        
        <div class="perfil-header">
            <div class="perfil-avatar-grande-container">
                <img id="avatar-perfil-img" 
                     src="{% if usuario.foto_perfil and usuario.foto_perfil != 'avatar_default.svg' %}/static/avatars/{{ usuario.foto_perfil }}{% else %}/static/avatars/avatar_default.svg{% endif %}" 
                     alt="Avatar" 
                     class="perfil-avatar-grande">
                <label for="input-foto-perfil" class="btn-cambiar-avatar" title="Cambiar foto">📷</label>
                <input type="file" id="input-foto-perfil" accept="image/*" onchange="subirFotoPerfil()">
            </div>
            <h1 class="perfil-nombre" id="display-nombre">{{ usuario.nombre }}</h1>
            <p class="perfil-email" id="display-email">{{ usuario.email }}</p>
        </div>
        
        <div class="perfil-seccion">
            <h2 class="perfil-seccion-titulo">Información personal</h2>
            <div class="perfil-campo">
                <label>Nombre</label>
                <input type="text" id="input-nombre" value="{{ usuario.nombre }}">
            </div>
            <div class="perfil-campo">
                <label>Correo electrónico</label>
                <input type="email" id="input-email" value="{{ usuario.email }}">
            </div>
            <button class="perfil-btn-guardar" onclick="actualizarPerfil()">Guardar cambios</button>
            <div id="mensaje-perfil" class="perfil-mensaje"></div>
        </div>
        
        <div class="perfil-seccion">
            <h2 class="perfil-seccion-titulo">Cambiar contraseña</h2>
            <div class="perfil-campo">
                <label>Contraseña actual</label>
                <input type="password" id="input-password-actual" placeholder="••••••••">
            </div>
            <div class="perfil-campo">
                <label>Nueva contraseña</label>
                <input type="password" id="input-password-nueva" placeholder="Mínimo 8 caracteres">
            </div>
            <div class="perfil-campo">
                <label>Confirmar nueva contraseña</label>
                <input type="password" id="input-password-confirm" placeholder="Repite la contraseña">
            </div>
            <button class="perfil-btn-guardar" onclick="cambiarPassword()">Cambiar contraseña</button>
            <div id="mensaje-password" class="perfil-mensaje"></div>
        </div>
        
        <div class="perfil-seccion" style="text-align: center;">
            <button class="perfil-btn-guardar" style="background: #e53e3e;" onclick="cerrarSesionDesdePerfil()">Cerrar sesión</button>
        </div>
    </div>

    <script>
        async function actualizarPerfil() {
            const nombre = document.getElementById('input-nombre').value.trim();
            const email = document.getElementById('input-email').value.trim();
            const mensajeDiv = document.getElementById('mensaje-perfil');
            
            try {
                const response = await fetch('/api/auth/perfil', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email })
                });
                
                const data = await response.json();
                
                if (data.exito) {
                    mensajeDiv.className = 'perfil-mensaje exito';
                    mensajeDiv.textContent = 'Perfil actualizado correctamente';
                    document.getElementById('display-nombre').textContent = data.user.nombre;
                    document.getElementById('display-email').textContent = data.user.email;
                } else {
                    mensajeDiv.className = 'perfil-mensaje error';
                    mensajeDiv.textContent = data.error || 'Error al actualizar';
                }
            } catch (error) {
                mensajeDiv.className = 'perfil-mensaje error';
                mensajeDiv.textContent = 'Error de conexión';
            }
        }
        
        async function cambiarPassword() {
            const actual = document.getElementById('input-password-actual').value;
            const nueva = document.getElementById('input-password-nueva').value;
            const confirm = document.getElementById('input-password-confirm').value;
            const mensajeDiv = document.getElementById('mensaje-password');
            
            if (nueva !== confirm) {
                mensajeDiv.className = 'perfil-mensaje error';
                mensajeDiv.textContent = 'Las contraseñas no coinciden';
                return;
            }
            
            if (nueva.length < 8) {
                mensajeDiv.className = 'perfil-mensaje error';
                mensajeDiv.textContent = 'La contraseña debe tener al menos 8 caracteres';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/perfil/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password_actual: actual, password_nueva: nueva })
                });
                
                const data = await response.json();
                
                if (data.exito) {
                    mensajeDiv.className = 'perfil-mensaje exito';
                    mensajeDiv.textContent = 'Contraseña cambiada correctamente';
                    document.getElementById('input-password-actual').value = '';
                    document.getElementById('input-password-nueva').value = '';
                    document.getElementById('input-password-confirm').value = '';
                } else {
                    mensajeDiv.className = 'perfil-mensaje error';
                    mensajeDiv.textContent = data.error || 'Error al cambiar contraseña';
                }
            } catch (error) {
                mensajeDiv.className = 'perfil-mensaje error';
                mensajeDiv.textContent = 'Error de conexión';
            }
        }
        
        async function subirFotoPerfil() {
            const input = document.getElementById('input-foto-perfil');
            const archivo = input.files[0];
            
            if (!archivo) return;
            
            const formData = new FormData();
            formData.append('foto', archivo);
            
            try {
                const response = await fetch('/api/auth/perfil/foto', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.exito) {
                    const avatarImg = document.getElementById('avatar-perfil-img');
                    avatarImg.src = `/static/avatars/${data.user.foto_perfil}?t=${Date.now()}`;
                    alert('Foto actualizada correctamente');
                } else {
                    alert(data.error || 'Error al subir foto');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
        
        async function cerrarSesionDesdePerfil() {
            if (!confirm('¿Estás seguro de que quieres cerrar sesión?')) return;
            
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                alert('Error al cerrar sesión');
            }
        }
    </script>
</body>
</html>
